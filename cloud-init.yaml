#cloud-config

package_update: true
package_upgrade: true

packages:
  - apache2
  - mariadb-server
  - php
  - php-mysql
  - php-cli
  - php-curl
  - php-gd
  - php-mbstring
  - php-xml
  - php-xmlrpc
  - php-soap
  - php-intl
  - php-zip
  - unzip
  - wget
  - curl

runcmd:

  # Enable services
  - systemctl enable apache2
  - systemctl enable mariadb
  - systemctl start mariadb
  - systemctl start apache2

  # Secure MariaDB (basic)
  - mysql -e "DELETE FROM mysql.user WHERE User='';"
  - mysql -e "DROP DATABASE IF EXISTS test;"
  - mysql -e "DELETE FROM mysql.db WHERE Db='test' OR Db='test\\_%';"
  - mysql -e "FLUSH PRIVILEGES;"

  # Create WordPress database
  - mysql -e "CREATE DATABASE wordpress DEFAULT CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
  - mysql -e "CREATE USER 'wordpress'@'localhost' IDENTIFIED BY 'WordPressPassword123!';"
  - mysql -e "GRANT ALL PRIVILEGES ON wordpress.* TO 'wordpress'@'localhost';"
  - mysql -e "FLUSH PRIVILEGES;"

  # Download WordPress
  - cd /tmp
  - wget https://wordpress.org/latest.tar.gz
  - tar -xzf latest.tar.gz

  # Install WordPress
  - rm -rf /var/www/html/*
  - cp -r /tmp/wordpress/* /var/www/html/

  # Configure WordPress
  - cp /var/www/html/wp-config-sample.php /var/www/html/wp-config.php

  - sed -i "s/database_name_here/wordpress/" /var/www/html/wp-config.php
  - sed -i "s/username_here/wordpress/" /var/www/html/wp-config.php
  - sed -i "s/password_here/WordPressPassword123!/" /var/www/html/wp-config.php
  - sed -i "s/localhost/127.0.0.1/" /var/www/html/wp-config.php

  # Permissions
  - chown -R www-data:www-data /var/www/html
  - find /var/www/html -type d -exec chmod 755 {} \;
  - find /var/www/html -type f -exec chmod 644 {} \;

  # Apache
  - a2enmod rewrite

  - |
      cat > /etc/apache2/sites-available/000-default.conf <<EOF
      <VirtualHost *:80>
          DocumentRoot /var/www/html

          <Directory /var/www/html>
              AllowOverride All
              Require all granted
          </Directory>

          ErrorLog \${APACHE_LOG_DIR}/error.log
          CustomLog \${APACHE_LOG_DIR}/access.log combined
      </VirtualHost>
      EOF

  - systemctl restart apache2

final_message: |
  ==================================================
      WordPress installation complete!
  ==================================================

  Browse to:

      http://<PUBLIC-IP>

  Database:
      Name: wordpress
      User: wordpress
      Password: WordPressPassword123!

  Finish the installation in the browser.
